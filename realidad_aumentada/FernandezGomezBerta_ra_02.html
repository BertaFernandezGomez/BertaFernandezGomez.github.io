<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba 3D Semáforo</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

<a-sky color="#222"></a-sky>

<a-plane
position="0 0 -4"
rotation="-90 0 0"
width="6"
height="6"
color="#555">
</a-plane>

<a-entity id="modelo" position="0 0 -4">

<a-cylinder
position="0 0.7 0"
radius="0.07"
height="1.4"
color="gray">
</a-cylinder>

<a-box
position="0 1.5 0"
width="0.35"
height="0.8"
depth="0.2"
color="black">
</a-box>

<a-sphere
position="0 1.7 0.12"
radius="0.07"
color="red">
</a-sphere>

<a-sphere
position="0 1.5 0.12"
radius="0.07"
color="yellow">
</a-sphere>

<a-sphere
position="0 1.3 0.12"
radius="0.07"
color="green">
</a-sphere>

</a-entity>

<a-camera position="0 1.6 0"></a-camera>

</a-scene>

</body>
</html>
